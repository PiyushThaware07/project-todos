version: "3.9"

services:
  client:
    image: piyushthaware07/todo-client:latest
    ports:
    - "5173:5173"
    env_file:
    - ./todo-client/.env
    depends_on:
    - server
    restart: always
    networks:
    - todo-network

  server:
    image: piyushthaware07/todo-server:latest
    ports:
    - "8000:8000"
    env_file:
    - ./todo-server/.env
    depends_on:
    - mongodb
    restart: always
    networks:
    - todo-network

  mongodb:
    image: mongo:latest
    restart: always
    volumes:
    - mongo_data:/data/db
    networks:
    - todo-network

volumes:
  mongo_data:

networks:
  todo-network:
    driver: bridge
