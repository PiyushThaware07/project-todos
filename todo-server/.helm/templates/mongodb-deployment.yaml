apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todo-server.fullname" . }}-mongodb-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-pod
  template:
    metadata:
      labels:
        app: mongodb-pod
    spec:
      containers:
        - name: mongodb-container
          image: mongo:6
          ports:
            - containerPort: 27017